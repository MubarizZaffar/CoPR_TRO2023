  work_dir: /home/mzaffar/Documents/codes/COPR
  img_dir: /home/mzaffar/Documents/datasets/station_escalator #or 7scenes or Cambridge or University or synthetic_shopfacade
  train_pairs_fname: ${data_params.work_dir}/assets/data/db_all_med_hard_train_station_escalator.txt #db_all_med_hard_train_shopfacade_2m25cm_top20 or db_all_med_hard_train_university_ds20_nonmixed or db_all_med_hard_train_ds50_nonmixed or db_all_med_hard_train_ds50 or db_all_med_hard_train_university_ds50 or db_all_med_hard_train_newest_mixed or db_all_med_hard_train_university_newest_mixedpairs 
  val_pairs_fname: ${data_params.work_dir}/assets/data/db_all_med_hard_valid_station_escalator.txt #db_all_med_hard_train_shopfacade_2m100cm_top20 or db_all_med_hard_valid_university_ds20_newer_nonmixed or db_all_med_hard_valid_ds50_newer_nonmixed or db_all_med_hard_valid_ds50_newer or db_all_med_hard_valid_university_ds50_newer or db_all_med_hard_valid_newest_mixed or db_all_med_hard_valid_university_newest3_mixedpairs
  descdictpathtrain: ${data_params.work_dir}/assets/data/train_descs_resnet34_originalmodel_ds507scenes_5e_05_stationescalator.pkl # train_descs_resnet34_originalmodel_ds207scenestriplet_1e_05_stationescalator train_descs_resnet34_originalmodel_station_escalatordistance_v4_5e_05.pkl or train_descs_resnet34_originalmodel_ds207scenestriplet_1e_05_shopfacade_2m25cm_top20 or train_descs_resnet34_originalmodel_ds207scenestriplet_1e_05.pkl or train_descs_resnet34_originalmodel_ds207scenestriplet_1e_05 or train_descs_resnet34_originalmodel_syntheticshopfacade_train2m25cm_val2m100cm_do0.3synthetic_shopfacadedistance_0.0001 or train_descs_resnet34_originalmodel_distanceloss1e4_ds507scenes or train_descs_resnet34_originalmodel_distanceloss1e4_ds507scenes_shopfacade_2m25cm_top20 or train_descs_resnet34_originalmodel_ds507scenes_5e_05_shopfacade_2m25cm_top20.pkl  or train_descs_resnet34_originalmodel_ds20university_1e_05 or train_descs_resnet34_originalmodel_ds50university_5e_05 or train_descs_resnet34_originalmodel_ds507scenes_5e_05 or train_descs_resnet34_originalmodel_newest_mixed_7scenes_5e_06 or train_descs_resnet34_originalmodel_newest3_mixed_University_5e_05 
  descdictpathval: ${data_params.work_dir}/assets/data/val_descs_resnet34_originalmodel_ds507scenes_5e_05_stationescalator.pkl # val_descs_resnet34_originalmodel_ds207scenestriplet_1e_05_stationescalator or val_descs_resnet34_originalmodel_station_escalatordistance_v4_5e_05.pkl or val_descs_resnet34_originalmodel_ds207scenestriplet_1e_05_shopfacade_2m100cm_top20 or val_descs_resnet34_originalmodel_ds207scenestriplet_1e_05.pkl or val_descs_resnet34_originalmodel_ds207scenestriplet_1e_05 or val_descs_resnet34_originalmodel_syntheticshopfacade_train2m25cm_val2m100cm_do0.3synthetic_shopfacadedistance_0.0001.pkl or val_descs_resnet34_originalmodel_distanceloss1e4_ds507scenes or val_descs_resnet34_originalmodel_distanceloss1e4_ds507scenes_shopfacade_2m100cm_top20 or val_descs_resnet34_originalmodel_ds507scenes_5e_05_shopfacade_2m100cm_top20.pkl or val_descs_resnet34_originalmodel_ds20university_1e_05 or val_descs_resnet34_originalmodel_ds50university_5e_05 or val_descs_resnet34_originalmodel_ds507scenes_5e_05 or val_descs_resnet34_originalmodel_newest_mixed_7scenes_5e_06 or val_descs_resnet34_originalmodel_newest3_mixed_University_5e_05 
model_params:
  backbone_net: resnet34
  resume_snapshot: null
train_params:
  bs: 32
  lr: 5e-4
  alpha: 1
  n_workers: 8
  n_train_iters: 800000 # 42k is the size of our training dataset 'db_all_med_hard_train.txt'
  scheduler:
    lrate_decay_steps: 50000 #originally 15000
    lrate_decay_factor: 0.5
output_params:
  out_dir: /home/mzaffar/Documents/codes/COPR/output
  logger_dir: ${output_params.out_dir}/tboard/${model_params.backbone_net}
  snapshot_dir: ${output_params.out_dir}/snapshots/${model_params.backbone_net}
  validate_interval: 1300
  log_scalar_interval: 200
seed: 1984
hydra:
  run:
    dir: ${output_params.out_dir}
