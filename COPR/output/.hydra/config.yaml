pipeline: Relative Camera Pose Estimation pipeline
data_params:
  datasetname: station_escalator
  work_dir: /home/mzaffar/Documents/codes/COPR
  img_dir: /home/mzaffar/Documents/datasets/station_escalator
  train_pairs_fname: ${data_params.work_dir}/assets/data/db_all_med_hard_train_station_escalator.txt
  val_pairs_fname: ${data_params.work_dir}/assets/data/db_all_med_hard_valid_station_escalator.txt
